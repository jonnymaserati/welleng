# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: welleng-tests

on:
  push:
    branches: [ 'main', 'dev' ]
  pull_request:
    branches: [ 'main', 'dev' ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install APT dependencies
      run: |
        sudo apt-get update -qq -y
        sudo apt-get install -qq -y build-essential libspatialindex-dev

    - name: Lint with flake8
      run: |
        uv run --with flake8 flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run --with flake8 flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test a minimal install
      run: |
        uv run --isolated --no-dev -p ${{ matrix.python-version }} python tests/test_minimal.py

    - name: Install welleng with all extras and run tests
      run: |
        uv sync --extra all
        uv run pytest tests
